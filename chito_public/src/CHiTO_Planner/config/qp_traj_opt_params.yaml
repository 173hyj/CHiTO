/qp_traj_opt:
  ros__parameters:

    output_dir: "/home/hyj/iris_rviz_ws/src/scene3/qp_paths"
    log_paths_each_attempt: true
    print_final_path: true

    # ============================
    # 批量：输入目录 / 匹配规则 / 统计输出
    # ============================
    batch_in_dir: "/home/hyj/iris_rviz_ws/src/iris_rviz_cpp/src/corridors_out1/ik_results"
    batch_glob: "corridor_*_ik.csv"
    csv_out: "/home/hyj/iris_rviz_ws/src/scene2/qp_batch_metrics2.csv"


    # 每个文件的关节单位（若文件未显式声明单位时的缺省）
    q_file_is_deg_default: true

    # ============================
    # 障碍物场景
    # ============================
    convex_scene_yaml: "/home/hyj/iris_rviz_ws/src/collision/2safety.scene"

    # ============================
    # 优化主参数（全局 QP）
    # ============================
    d_safe: 0.05
    cont_min_d_safe: 0.00

    mu: 1.0
    alpha: 0.6
    trust_s: 3.0
    max_iters: 50
    max_trust_attempts: 3

    # ============================
    # 全局 termination（决定 success 判定阈值）
    # ============================
    stop_when_min_d_ge: true
    stop_min_d: 0.00
    min_d_ignore_warmup: true
    warmup_safe_iters: 0

    iter_period_ms: 0
    fix_last_joint_to_zero: false

    # ============================
    # 全局 μ 自适应
    # ============================
    mu_scale_on_unsafe: 1.0
    mu_max: 10.0
    boost_mu_only_after_warmup: false

    # ============================
    # 可视化与调试（批量时建议关可视化以提速）
    # ============================
    debug_print_q: true
    qos_transient_local: true
    debug_viz_local_qp: false
    debug_log_local_qp: true
    batch_visualize: false

    # ============================
    # 连续检测（post-process 修补）
    # ============================
    cont_after_global_only: true
    use_continuity_check_log_only: false
    local_seg_max_iters: 50

    # ============================
    # 局部 QP 参数
    # ============================
    local_trust_s: 0.05
    local_alpha: 1.0
    local_mu_scale: 1.0
 # =======================
    # End-effector: Gripper
    # =======================
    gripper_enable: false
    gripper_in_collision: false
    torch_enable: true
    torch_in_collision: true

    gripper_mount_x: 0.0
    gripper_mount_y: 0.0
    gripper_mount_z: 0.0

    gripper_mount_roll_deg: 0.0
    gripper_mount_pitch_deg: 0.0
    gripper_mount_yaw_deg: 90.0

    gripper_palm_len: 0.060
    gripper_palm_width: 0.080
    gripper_palm_thick: 0.030

    gripper_finger_len: 0.090
    gripper_finger_width: 0.012
    gripper_finger_thick: 0.020

    gripper_opening: 0.080

    frame_id: "world"
    # ============================
    # 局部 μ 自适应
    # ============================
    mu_local: 1.0
    mu_local_max: 10.0
    mu_scale_on_unsafe_local: 1.3
    boost_mu_only_after_warmup_local: false
    warmup_safe_iters_local: 0

