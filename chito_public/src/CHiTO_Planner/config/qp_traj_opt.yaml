/**:
  ros__parameters:

    # =======================
    # Mode
    # =======================
    do_batch_mode: false

    # =======================
    # Init path (non-batch)
    # =======================
    # 你的初始路径文件（按你 load_q_path_from_file_ 的格式：可6列或 t+6列）
    init_q_file: "/home/hyj/iris_rviz_ws/src/scene3/results/run_000_qp.csv"
    q_file_is_deg_default: true   # 若文件没写 #deg/#rad，就按这个默认
    convex_scene_yaml: "/home/hyj/iris_rviz_ws/src/scene3/scene3.scene"
    # =======================
    # Global TR-QP params
    # =======================
    cont_min_d_safe: 0.00
    mu: 1.0
    d_safe: 0.05
    trust_s: 0.06
    fix_last_joint_to_zero: false
    max_iters: 50
    max_trust_attempts: 3
    mi_thresh: 1.0e-6

    trust_s_min: 0.05
    trust_s_max: 1.0
    tau_plus: 0.10
    tau_minus: 0.05
    xtol: 1.0e-3

    # Stop conditions
    stop_when_safe: true

    stop_when_min_d_ge: true
    stop_min_d: 0.0
    min_d_ignore_warmup: true
    warmup_safe_iters: 0

    # Unsafe -> scale mu (global)
    mu_scale_on_unsafe: 1.3
    mu_max: 8.0
    boost_mu_only_after_warmup: true

    # =======================
    # Continuity / localQP
    # =======================
    # true: 每轮全局QP后不修补，结束时 finalize 再修补若干次
    # false: 每一轮全局QP之后立刻 run_continuity_pass_once_() 插点修补
    cont_after_global_only: true

    # 连续安全判据：swept hull 对障碍的距离阈值
    cont_min_d_safe: 0.00

    # 关键：必须 false 才会真的插中点 + 调用 run_local_qp_single_
    use_continuity_check_log_only: false

    # localQP 外层迭代次数（每条边）
    local_seg_max_iters: 20

    # localQP 的参数（你的 reset_local_state_all_ 会从参数里读）
    mu_local: 1.0
    mu_local_max: 10.0
    mu_scale_on_unsafe_local: 1.3
    boost_mu_only_after_warmup_local: false
    warmup_safe_iters_local: 0

    local_trust_s: 0.20
    local_alpha: 0.5

    # =======================
    # End-effector: Gripper
    # =======================
    # false -> 用原来的 torch
    # true  -> 用 3-box gripper 作为末端，并替代 torch
    gripper_enable: true
    gripper_in_collision: true

    # 安装偏移（相对于 TCP 局部坐标系）
    gripper_mount_x: 0.0
    gripper_mount_y: 0.0
    gripper_mount_z: 0.0

    # 安装姿态（相对于 TCP 局部坐标系）
    # 你之前已经调到“绕六轴 z 轴旋转 90 度”是对的
    gripper_mount_roll_deg: 0.0
    gripper_mount_pitch_deg: 0.0
    gripper_mount_yaw_deg: 90.0

    # 3-box gripper 尺寸
    gripper_palm_len: 0.060
    gripper_palm_width: 0.080
    gripper_palm_thick: 0.030

    gripper_finger_len: 0.090
    gripper_finger_width: 0.012
    gripper_finger_thick: 0.020

    # 手指张开宽度
    gripper_opening: 0.080


    # =======================
    # Visualization / Debug
    # =======================
    frame_id: "world"

    debug_verify_viz: true
    debug_dump_sizes: true
    debug_log_sub_count: true

    debug_log_local_qp: true
    debug_print_q: false


